name: lingtour-allinone

services:
  allinone:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.allinone
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_DB: ${POSTGRES_DB:-lingtour}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-123456}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET:-lingtour-dev-admin-token-secret}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-4.5}
    ports:
      - "8000:8000"
      - "5433:5432"
    restart: unless-stopped
    volumes:
      - allinone_postgres_data:/var/lib/postgresql/data
      - allinone_admin_knowledge:/workspace/data/admin_knowledge
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 35s

volumes:
  allinone_postgres_data:
  allinone_admin_knowledge:
